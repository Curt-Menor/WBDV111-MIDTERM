<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SwiftCart - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    height:100vh;
}

/* NAVBAR */
.navbar{
    position:fixed;
    top:0;
    width:100%;
    background:#111;
    color:white;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 30px;
    z-index:10;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
}

.logo img{
    width:30px;
}

.nav-links{
    display:flex;
    align-items:center;
    gap:20px;
}

.nav-links a{
    color:white;
    text-decoration:none;
}

.user-icon{
    width:30px;
    border-radius:50%;
}

/* SPLIT SCREEN */
.container{
    display:flex;
    height:100vh;
}

/* LEFT SIDE */
.left{
    flex:1;
    background:rgba(0, 0, 139);
    position:relative;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    padding:40px;
}

/* DARK OVERLAY */
.left::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.6);
}

.left-content{
    position:relative;
    color:white;
    z-index:1;
}

.left h1{
    font-size:42px;
    margin-bottom:20px;
}

.left p{
    font-size:18px;
    max-width:500px;
}

/* RIGHT SIDE */
.right{
    flex:1;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#007bff,#00c6ff);
}

/* GLASS LOGIN BOX */
.login-box{
    background:rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    padding:40px;
    width:350px;
    border-radius:15px;
    color:white;
    box-shadow:0 8px 32px rgba(0,0,0,0.3);
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.input-group{
    margin-bottom:15px;
}

.input-group input{
    width:100%;
    padding:10px;
    border:none;
    border-radius:5px;
    margin-top:5px;
}

button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-weight:bold;
}

.login-btn{
    background:#fff;
    color:#007bff;
}

.register-btn{
    background:#28a745;
    color:white;
}

/* RESPONSIVE */
@media(max-width:900px){
    .container{
        flex-direction:column;
    }
    .left, .right{
        flex:none;
        height:50vh;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <img src="logo.png" alt="logo">
        <strong>SwiftCart</strong>
    </div>

    <div class="nav-links">
        <a href="#">Catalog</a>
        <a href="#">Cart</a>
        <a href="#">Checkout</a>
        <a href="#">Status</a>
        <img src="user.png" class="user-icon" alt="user">
    </div>
</div>

<!-- SPLIT SCREEN -->
<div class="container">

    <!-- LEFT -->
    <div class="left">
        <div class="left-content">
            <h1>Shop Faster with SwiftCart</h1>
            <p>Discover amazing deals, add items to your cart, and checkout quickly with our seamless shopping experience.</p>
        </div>
    </div>

    <!-- RIGHT -->
    <div class="right">
        <div class="login-box">
            <h2>Login</h2>

            <div class="input-group">
                <label>Email</label>
                <input type="email" placeholder="Enter your email">
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password">
            </div>

            <button class="login-btn">Login</button>
            <button class="register-btn">Register</button>
        </div>
    </div>

</div>

</body>
</html>
