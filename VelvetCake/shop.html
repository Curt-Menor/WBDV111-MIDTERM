<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Velvet Crust Cakes | Home</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">
</head>
<body>
    <nav>
        <div class="logo">Velvet Crust</div>
        <input type="text" class="search-bar" placeholder="Search cakes...">
        
        <div class="nav-links">
            <a href="index.html" class="btn-cream">Home</a>
            <a href="shop.html" class="btn-cream">Shop</a>
            <a href="summary.html" class="btn-cream">Cart (<span id="cart-count">0</span>)</a>
            <a href="login.html" id="login-btn" class="btn-cream">Login</a>
        </div>
    </nav>

    <div id="cart-modal" class="modal-overlay">
        <div class="container" style="max-width: 400px; text-align: center;">
            <h2 id="modal-title">Confirm Selection</h2>
            <p id="modal-msg"></p>
            <div id="qty-box" style="display:none; margin: 20px;">
                <label>Quantity: </label>
                <input type="number" id="item-qty" value="1" min="1" style="width: 60px; padding: 5px;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="modal-yes" class="btn-cream" style="flex:1">Yes</button>
                <button id="modal-no" class="btn-cream" style="flex:1; background:rgba(255,255,255,0.2); color:white;">No</button>
            </div>
        </div>
    </div>

    <div class="container">

        <section id="shop" class="page">
            <h2 style="margin-bottom: 30px;">Our Full Collection</h2>
            
            <div class="filters">
                <button onclick="filterCategory('All')" class="btn-cream">All</button>
                <button onclick="filterCategory('Chocolate')" class="btn-cream">Chocolate</button>
                <button onclick="filterCategory('Fruit')" class="btn-cream">Fruit</button>
                <button onclick="filterCategory('Specialty')" class="btn-cream">Specialty</button>
            </div>

            <div class="grid" id="full-grid"></div>
        </section>

    
    </div>
    <script src="script.js"></script>
</body>
</html>
