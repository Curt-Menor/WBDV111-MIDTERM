<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Luna Vista Resort</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="index.html">Luna Vista Resort</a>
    <nav aria-label="Primary">
      <ul class="menu">
        <li><a href="index.html">Home</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="about.html">About Luna Vista</a></li>
        <li><a href="reservation.html">Reservation</a></li>
      </ul>
    </nav>
  </header>

  <main class="hero" id="hero">
    <div class="hero-shade"></div>

    <section class="login-card">
      <h1>Escape Starts Here</h1>
      <p>Sign in to view room rates, travel dates, and your itinerary.</p>

      <form class="login-form" id="loginForm">
        <label for="email">Email</label>
        <input id="email" type="email" required>

        <label for="password">Password</label>
        <input id="password" type="password" required>

        <button type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
